name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 當你推送到 main 分支時觸發

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Removed cache: 'npm' to avoid errors if package-lock.json is missing

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.api_key }} # 對應到你設定的 api_key

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 告訴 GitHub 只要部署打包後的 dist 資料夾
          branch: gh-pages # 部署到 gh-pages 分支
