name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 當你推送到 main 分支時觸發

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Removed cache: 'npm' to avoid errors if package-lock.json is missing

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          NODE_OPTIONS="--max-old-space-size=4096" npm run build
          ls -R dist
        env:
          GEMINI_API_KEY: ${{ secrets.api_key }}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 部署這個資料夾
          branch: gh-pages # 到這個分支
          clean: true # 每次部署都清理舊檔案
